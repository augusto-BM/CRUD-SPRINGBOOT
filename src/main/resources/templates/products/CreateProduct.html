<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nuevo Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-success text-white text-center rounded-top-4">
                    <h3 class="mb-0">Crear Producto</h3>
                </div>

                <div class="card-body p-4">

                    <form method="post"
                          enctype="multipart/form-data"
                          th:object="${productDto}">

                        <!-- Nombre -->
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control"
                                   th:field="*{name}">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('name')}"
                                 th:errors="*{name}"></div>
                        </div>

                        <!-- Marca -->
                        <div class="mb-3">
                            <label class="form-label">Marca</label>
                            <input type="text" class="form-control"
                                   th:field="*{brand}">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('brand')}"
                                 th:errors="*{brand}"></div>
                        </div>

                        <!-- Categoría -->
                        <div class="mb-3">
                            <label class="form-label">Categoría</label>
                            <select class="form-select" th:field="*{category}" style="cursor: pointer;">
                                <option value="Otros">Otros</option>
                                <option value="Celulares">Celulares</option>
                                <option value="Computadoras">Computadoras</option>
                                <option value="Accesorios">Accesorios</option>
                                <option value="Impresoras">Impresoras</option>
                                <option value="Camaras">Camaras</option>
                            </select>
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('category')}"
                                 th:errors="*{category}"></div>
                        </div>

                        <!-- Precio -->
                        <div class="mb-3">
                            <label class="form-label">Precio</label>
                            <input type="number" step="0.01" min="0" class="form-control"
                                   th:field="*{price}">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('price')}"
                                 th:errors="*{price}"></div>
                        </div>

                        <!-- Descripción -->
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" rows="4"
                                      th:field="*{description}"></textarea>
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('description')}"
                                 th:errors="*{description}"></div>
                        </div>

                        <!-- Imagen -->
                        <div class="mb-4">
                            <label class="form-label">Imagen</label>
                            <input type="file" class="form-control"
                                   th:field="*{imageFile}">

                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('imageFile')}"
                                 th:errors="*{imageFile}"></div>
                        </div>

                        <!-- Botones -->
                        <div class="d-flex flex-column align-items-center gap-3 mt-4">

                            <button type="submit" class="btn btn-success btn-lg px-5 shadow-sm">Guardar </button>

                            <a href="/products" class="btn btn-outline-secondary btn-lg px-5" role="button">Regresar</a>

                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
